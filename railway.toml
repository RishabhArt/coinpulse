# Railway Configuration for CoinPulse

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "web"
source = "."
healthcheckPath = "/api/health"
healthcheckTimeout = 100

[scale]
min = 1
max = 1

[env]
NODE_ENV = "production"
PORT = "3000"
